[flake8]
exclude = .git, *migrations*
max-line-length = 88
select = C,E,F,W,B,B950
ignore = E203, E231, E501, W503, W291, W293


[tox]
envlist = {py310, py311, py312}-django{42, 52}, docs, pylint

[testenv]
setenv =
    django42: DJANGO_SETTINGS_MODULE = testauth.settings_aa4.local
    django52: DJANGO_SETTINGS_MODULE = testauth.settings_aa5.local

deps=
    django42: allianceauth>=4,<5
    django52: allianceauth>=5,<6
    aa-structuretimers>=3

extras =
    test

commands_pre=
    pip list

commands=
    coverage run runtests.py -v 2 --failfast
    coverage xml
    coverage report

[testenv:docs]
setenv =
    DJANGO_SETTINGS_MODULE = testauth.settings_aa4.local

deps = -r{toxinidir}/docs/requirements.txt
; install_command = python -I -m pip install {opts} {packages}
commands =
    sphinx-build -d "{toxworkdir}/docs_doctree" docs "{toxworkdir}/docs_out" --color -W -bhtml {posargs}

[testenv:pylint]
setenv =
    DJANGO_SETTINGS_MODULE = testauth.settings_aa4.local

deps=
    pylint
    pylint-django
    allianceauth>=4,<5
    aa-structuretimers>=3

commands=
    pylint --load-plugins pylint_django structures
